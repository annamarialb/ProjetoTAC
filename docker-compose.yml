services:
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - CATALOG_URL=http://catalog:3001
      - ORDERS_URL=http://orders:3002
    depends_on:
      - catalog
      - orders
    networks:
      - plataforma-network
  catalog:
    build:
      context: ./services/catalog
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://:redissenha123@redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - plataforma-network
  orders:
    build:
      context: ./services/orders
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - CATALOG_URL=http://catalog:3001
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - PG_CONNECTION=postgresql://admin:senha123@postgres:5432/plataforma_pedidos
      - NODE_ENV=production
    depends_on:
      - catalog
      - rabbitmq
      - postgres
    networks:
      - plataforma-network
  notifications:
    build:
      context: ./services/notifications
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - PG_CONNECTION=postgresql://admin:senha123@postgres:5432/plataforma_pedidos
      - NODE_ENV=production
    depends_on:
      - rabbitmq
      - postgres
    networks:
      - plataforma-network
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - plataforma-network
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=senha123
      - POSTGRES_DB=plataforma_pedidos
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - plataforma-network
  redis:
    image: redis:7-alpine
    container_name: gestaopedidos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --requirepass redissenha123
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redissenha123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - plataforma-network
networks:
  plataforma-network:
    driver: bridge
volumes:
  postgres-data:
  rabbitmq-data:
  redis-data: